id: appendicitis
severity: urgent
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 18
  sex: male
  chief_complaint: stomach pain moving to right side
  patient_card: 18-year-old male presents with periumbilical pain that migrated to the right lower quadrant over the past
    12 hours. Reports nausea and loss of appetite.
- variant_id: v2
  variant_type: acute_severe
  age: 25
  sex: female
  chief_complaint: sharp lower belly pain and vomiting
  patient_card: 25-year-old female presents with severe, sharp right lower quadrant pain, multiple episodes of vomiting, and
    subjective fever. Looks ill and tachycardic.
- variant_id: v3
  variant_type: atypical
  age: 65
  sex: male
  chief_complaint: weakness and loss of appetite
  patient_card: 65-year-old male presenting with generalized weakness, confusion, and poor appetite for two days. Denies focal
    abdominal pain initially but winces on palpation.
