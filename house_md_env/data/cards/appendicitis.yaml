exam_distribution:
  vital_signs:
    findings:
    - HR 105, BP 120/80, RR 18, Temp 38.2°C, SpO2 98%
    - HR 115, BP 110/70, RR 20, Temp 38.8°C, SpO2 97%
    - HR 90, BP 130/85, RR 16, Temp 37.5°C, SpO2 99%
  general_appearance:
    findings:
    - Appears uncomfortable, lying still on the bed.
    - In moderate distress, clutching abdomen.
    - Looks fatigued and mildly dehydrated.
  mental_status:
    findings:
    - Alert and oriented x3, normal speech.
    - Alert, slightly distracted by pain.
    - Awake, oriented, but lethargic.
  heent:
    findings:
    - Normocephalic, PERRLA, mucous membranes slightly dry.
    - Unremarkable HEENT exam.
    - Pupils equal and reactive, clear oropharynx.
  neck_exam:
    findings:
    - Supple, no lymphadenopathy, no JVD.
    - Trachea midline, no meningismus.
    - Normal neck exam, thyroid not enlarged.
  cardiac_auscultation:
    findings:
    - Tachycardic, regular rhythm, no murmurs.
    - Normal S1/S2, no rubs or gallops.
    - Regular rate and rhythm, no extra heart sounds.
  pulmonary_auscultation:
    findings:
    - Clear to auscultation bilaterally.
    - Good air entry, no wheezes or crackles.
    - Normal breath sounds, no respiratory distress.
  peripheral_perfusion:
    findings:
    - Warm extremities, capillary refill < 2 seconds.
    - Normal pulses, no edema.
    - No calf tenderness, normal perfusion.
  abdominal_palpation:
    findings:
    - Marked RLQ tenderness, positive McBurney's point tenderness, guarding present.
    - Diffuse lower abdominal tenderness, worse on the right, positive Rovsing's sign.
    - Mild RLQ tenderness, no rebound, voluntary guarding.
  cva_tenderness:
    findings:
    - No CVA tenderness bilaterally.
    - Negative for CVA tenderness.
    - Back is non-tender, no CVA pain.
  pelvic_exam:
    findings:
    - Deferred; external genitalia visually normal.
    - No cervical motion tenderness, no adnexal masses.
    - Normal pelvic exam, no discharge.
  cranial_nerves:
    findings:
    - Cranial nerves II-XII intact.
    - Grossly intact cranial nerves.
    - No focal cranial nerve deficits.
  motor_sensory:
    findings:
    - 5/5 strength in all extremities, normal sensation.
    - Normal gait, intact motor and sensory function.
    - Reflexes 2+ symmetric, no deficits.
  skin_exam:
    findings:
    - Warm, dry, no rashes.
    - Normal skin turgor, no petechiae.
    - Slightly flushed, no lesions.
  musculoskeletal_chest_wall:
    findings:
    - No chest wall tenderness.
    - Normal MSK exam, joints non-tender.
    - No reproducible chest pain on palpation.
test_sensitivities:
  cbc:
    prob_abnormal: 0.9
    values_abnormal:
    - value: WBC 14,500/μL [H], Neutrophils 85% [H]
      flag: H
    - value: WBC 18,200/μL [H], Bands 5% [H]
      flag: H
    - value: WBC 12,100/μL [H]
      flag: H
    value_normal: WBC 7,500/μL, Hgb 14.0 g/dL
    is_confirmatory: false
  bmp:
    prob_abnormal: 0.3
    values_abnormal:
    - value: BUN 25 mg/dL [H], Cr 1.1 mg/dL
      flag: H
    - value: K 3.3 mEq/L [L]
      flag: L
    - value: Na 134 mEq/L [L]
      flag: L
    value_normal: Electrolytes and renal function within normal limits
    is_confirmatory: false
  urinalysis:
    prob_abnormal: 0.2
    values_abnormal:
    - value: WBC 5-10/hpf [H], no bacteria
      flag: H
    - value: RBC 3-5/hpf [H]
      flag: H
    - value: Trace ketones
      flag: H
    value_normal: Negative for infection or blood
    is_confirmatory: false
  crp_esr:
    prob_abnormal: 0.85
    values_abnormal:
    - value: CRP 45 mg/L [H]
      flag: H
    - value: CRP 80 mg/L [H]
      flag: H
    - value: CRP 25 mg/L [H]
      flag: H
    value_normal: CRP < 5 mg/L
    is_confirmatory: false
  ct_abdomen_pelvis:
    prob_abnormal: 0.95
    values_abnormal:
    - value: Dilated appendix measuring 9mm with wall thickening and periappendiceal fat stranding.
      flag: CRIT
    - value: Enlarged appendix (11mm) with an appendicolith and adjacent fluid collection.
      flag: CRIT
    - value: 7mm appendix with mild surrounding inflammatory changes.
      flag: H
    value_normal: Normal appendix, no acute intra-abdominal pathology.
    is_confirmatory: true
  abdominal_ultrasound:
    prob_abnormal: 0.8
    values_abnormal:
    - value: Non-compressible, blind-ending tubular structure in RLQ measuring 8mm.
      flag: H
    - value: Hyperemic, enlarged appendix with surrounding free fluid.
      flag: H
    - value: Probable appendicitis, appendix measures 7.5mm.
      flag: H
    value_normal: Appendix not visualized, no RLQ fluid.
    is_confirmatory: true
  pelvic_ultrasound_tv:
    prob_abnormal: 0.1
    values_abnormal:
    - value: Normal ovaries, incidental fluid in RLQ.
      flag: H
    - value: Normal uterus and adnexa, prominent bowel loops.
      flag: H
    - value: Unremarkable pelvic US.
      flag: H
    value_normal: Normal pelvic ultrasound.
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - ct_abdomen_pelvis
  - abdominal_ultrasound
  require: abnormal
decoy:
  test: pelvic_ultrasound_tv
  biased_finding: Right ovary appears slightly bulky compared to the left, with prominent peripheral follicles. Trace free
    fluid.
  decoy_toward_disease: ovarian_torsion
  requires_followup:
  - ct_abdomen_pelvis
  - abdominal_ultrasound
red_herring:
  disease: ovarian_torsion
  shared_features:
  - pain_location
  - nausea_vomiting
  - abdominal_palpation
  discriminating_features:
  - pelvic_ultrasound_tv
  - pelvic_exam
