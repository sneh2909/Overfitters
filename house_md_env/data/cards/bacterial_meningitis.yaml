id: bacterial_meningitis
severity: critical
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 22
  sex: male
  chief_complaint: severe headache and stiff neck
  patient_card: 22-year-old male college student presenting with severe headache and stiff neck for 24 hours. Roommate noted
    he was sensitive to light.
- variant_id: v2
  variant_type: acute_severe
  age: 15
  sex: female
  chief_complaint: high fever and extreme confusion
  patient_card: 15-year-old female brought in by parents with high fever and extreme confusion starting this morning. She
    has a rapidly spreading rash.
- variant_id: v3
  variant_type: atypical
  age: 68
  sex: male
  chief_complaint: just feeling weak and sleepy
  patient_card: 68-year-old male presenting with profound lethargy and weakness over the past two days. History of hypertension
    and recent ear infection.
