exam_distribution:
  vital_signs:
    findings:
    - HR 115, BP 105/65, RR 20, Temp 39.2°C, SpO2 98%
    - HR 125, BP 90/55, RR 24, Temp 39.8°C, SpO2 96%
    - HR 98, BP 130/80, RR 18, Temp 38.5°C, SpO2 99%
  general_appearance:
    findings:
    - Patient is ill-appearing, lying still with eyes closed, photophobic.
    - Toxic appearance, lethargic, difficult to arouse.
    - Uncomfortable, shielding eyes from light, mild distress.
  mental_status:
    findings:
    - Awake but slow to respond, oriented to person and place only.
    - Lethargic, confused, GCS 13 (E3 V4 M6).
    - Alert but irritable, follows commands appropriately.
  heent:
    findings:
    - Marked photophobia, PERRL, normal fundi, TMs clear.
    - Pupils equal and reactive, mild papilledema noted, dry mucous membranes.
    - Photophobia present, no papilledema, oropharynx clear.
  neck_exam:
    findings:
    - Significant nuchal rigidity, positive Brudzinski's sign.
    - Stiff neck, positive Kernig's sign, no JVD.
    - Resistance to passive neck flexion, tender posterior cervical musculature.
  cardiac_auscultation:
    findings:
    - Tachycardic, regular rhythm, no murmurs, rubs, or gallops.
    - Fast regular rate, normal S1/S2, no murmurs.
    - Tachycardia, no extra heart sounds.
  pulmonary_auscultation:
    findings:
    - Clear to auscultation bilaterally, no wheezes or crackles.
    - Lungs clear, normal respiratory effort.
    - Good air movement bilaterally, no adventitious sounds.
  peripheral_perfusion:
    findings:
    - Capillary refill 2 seconds, 2+ pulses, no edema.
    - Capillary refill delayed (4 seconds), weak peripheral pulses.
    - Warm extremities, brisk capillary refill, normal pulses.
  abdominal_palpation:
    findings:
    - Soft, non-tender, non-distended, normal bowel sounds.
    - Soft, mild diffuse discomfort, no guarding or rebound.
    - Non-tender, no masses or hepatosplenomegaly.
  cva_tenderness:
    findings:
    - No CVA tenderness bilaterally.
    - Negative for CVA tenderness.
    - Bilateral CVA non-tender.
  pelvic_exam:
    findings:
    - Deferred.
    - External genitalia normal, deferred internal exam.
    - Not indicated, deferred.
  cranial_nerves:
    findings:
    - CN II-XII grossly intact, photophobia limits full CN II testing.
    - Mild left CN VI palsy, otherwise CNs intact.
    - Cranial nerves intact, no focal deficits.
  motor_sensory:
    findings:
    - 5/5 strength in all extremities, sensation intact, reflexes 2+.
    - Moves all extremities spontaneously, reflexes 3+ bilaterally.
    - Normal tone and bulk, strength symmetric, no sensory deficits.
  skin_exam:
    findings:
    - Scattered petechial rash on lower extremities and trunk.
    - Purpuric lesions on ankles and wrists, warm to touch.
    - No rashes, petechiae, or purpura. Normal turgor.
  musculoskeletal_chest_wall:
    findings:
    - No chest wall tenderness, joints have full range of motion.
    - No joint effusions or tenderness.
    - Normal MSK exam, no reproducible chest pain.
test_sensitivities:
  cbc:
    prob_abnormal: 0.95
    values_abnormal:
    - value: WBC 18,500/μL (85% neutrophils), Hgb 14.2 g/dL, Plt 210k
      flag: H
    - value: WBC 22,000/μL (90% neutrophils), Hgb 13.5 g/dL, Plt 150k
      flag: H
    - value: WBC 15,400/μL (80% neutrophils), Hgb 12.8 g/dL, Plt 250k
      flag: H
    value_normal: WBC 7,500/μL, Hgb 14.0 g/dL, Plt 250k
    is_confirmatory: false
  bmp:
    prob_abnormal: 0.4
    values_abnormal:
    - value: Na 131 mEq/L, K 4.0 mEq/L, Cr 0.9 mg/dL
      flag: L
    - value: Na 128 mEq/L, K 3.8 mEq/L, Cr 1.2 mg/dL
      flag: L
    - value: Na 133 mEq/L, K 4.2 mEq/L, Cr 1.0 mg/dL
