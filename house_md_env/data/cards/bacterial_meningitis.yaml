    - value: WBC 4500 (95% PMNs), Glucose 15 mg/dL, Protein 220 mg/dL, Gram stain positive for Gram-negative diplococci
      flag: CRIT
    - value: WBC 800 (85% PMNs), Glucose 35 mg/dL, Protein 110 mg/dL, Gram stain pending
      flag: CRIT
    value_normal: WBC 2, Glucose 60 mg/dL, Protein 30 mg/dL, Gram stain negative
