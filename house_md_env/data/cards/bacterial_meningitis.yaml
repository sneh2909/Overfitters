      flag: H
    - value: 4.5 mmol/L
      flag: H
    - value: 2.8 mmol/L
      flag: H
    value_normal: 1.2 mmol/L
    is_confirmatory: false
  crp_esr:
    prob_abnormal: 0.9
    values_abnormal:
    - value: CRP 150 mg/L, ESR 65 mm/hr
      flag: H
    - value: CRP 210 mg/L, ESR 80 mm/hr
      flag: H
    - value: CRP 95 mg/L, ESR 50 mm/hr
      flag: H
    value_normal: CRP <5 mg/L, ESR 10 mm/hr
