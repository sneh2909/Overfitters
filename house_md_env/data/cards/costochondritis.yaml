id: costochondritis
severity: stable
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 25
  sex: male
  chief_complaint: sharp chest pain when breathing
  patient_card: 25-year-old male presents with sharp, localized chest pain that worsens with deep inspiration. He reports
    starting a new weightlifting routine two days ago.
- variant_id: v2
  variant_type: acute_severe
  age: 45
  sex: female
  chief_complaint: severe stabbing pain in ribs
  patient_card: 45-year-old female presents to the ED in distress with severe, stabbing left-sided rib pain. She is visibly
    guarding her chest and taking shallow breaths.
- variant_id: v3
  variant_type: atypical
  age: 60
  sex: male
  chief_complaint: front torso aching and tightness
  patient_card: 60-year-old male with a history of hypertension presents with a diffuse aching and tightness across his front
    torso. He is concerned about his heart.
