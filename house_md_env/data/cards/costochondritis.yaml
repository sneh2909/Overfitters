exam_distribution:
  vital_signs:
    findings:
    - HR 88, BP 120/80, RR 16, Temp 37.0°C, SpO2 99%
    - HR 102, BP 135/85, RR 18, Temp 36.8°C, SpO2 98%
    - HR 76, BP 118/76, RR 14, Temp 37.1°C, SpO2 100%
  general_appearance:
    findings:
    - Alert, well-appearing, in mild discomfort when taking deep breaths.
    - Anxious, guarding chest, but not toxic appearing.
    - Comfortable at rest, no acute distress.
  mental_status:
    findings:
    - Alert and oriented x3, normal mentation.
    - GCS 15, appropriate responses.
    - Awake, alert, normal cognitive function.
  heent:
    findings:
    - Normocephalic, atraumatic, PERRLA, clear oropharynx.
    - Pupils equal and reactive, normal fundoscopy, TMs clear.
    - Unremarkable HEENT exam.
  neck_exam:
    findings:
    - Supple, no JVD, no lymphadenopathy.
    - Full range of motion, no meningismus, thyroid normal.
    - No jugular venous distension, trachea midline.
  cardiac_auscultation:
    findings:
    - Regular rate and rhythm, normal S1/S2, no murmurs, rubs, or gallops.
    - Tachycardic but regular, no extra heart sounds.
    - Normal heart sounds, no friction rub appreciated.
  pulmonary_auscultation:
    findings:
    - Clear to auscultation bilaterally, no wheezes or crackles. Good air movement.
    - Lungs clear, but patient splints with deep inspiration.
    - Normal vesicular breath sounds, no adventitious sounds.
  peripheral_perfusion:
    findings:
    - 2+ pulses x4, capillary refill < 2 seconds, no edema.
    - Warm extremities, normal pulses, no calf tenderness.
    - No peripheral edema, normal perfusion.
  abdominal_palpation:
    findings:
    - Soft, non-tender, non-distended, normal bowel sounds.
    - No abdominal tenderness, no guarding or rebound.
    - Benign abdomen, no masses or organomegaly.
  cva_tenderness:
    findings:
    - No CVA tenderness bilaterally.
    - Negative for costovertebral angle tenderness.
    - Bilateral flanks non-tender.
  pelvic_exam:
    findings:
    - Deferred.
    - Not indicated.
    - Normal external genitalia, no exam performed.
  cranial_nerves:
    findings:
    - Cranial nerves II-XII intact.
    - Grossly intact cranial nerves.
    - No focal cranial nerve deficits.
  motor_sensory:
    findings:
    - 5/5 strength in all extremities, sensation intact.
    - Normal gait, normal reflexes, symmetric strength.
    - No focal motor or sensory deficits.
  skin_exam:
    findings:
    - Warm, dry, no rashes or lesions.
    - Normal skin turgor, no petechiae.
    - No diaphoresis, skin intact.
  musculoskeletal_chest_wall:
    findings:
    - Point tenderness reproducible upon palpation of the left 3rd and 4rd costochondral junctions.
    - Marked tenderness over the parasternal cartilage, reproducing the patient's chief complaint.
    - Chest wall tenderness to palpation on the left side, no swelling or erythema.
test_sensitivities:
  ecg:
    prob_abnormal: 0.15
    values_abnormal:
    - value: Sinus rhythm with non-specific T-wave flattening in anterior leads.
      flag: H
    - value: Sinus tachycardia at 105 bpm, otherwise normal.
      flag: H
    - value: Sinus rhythm with early repolarization, normal variant.
      flag: H
    value_normal: Normal sinus rhythm, normal axis, no ST-T wave changes.
    is_confirmatory: false
  troponin:
    prob_abnormal: 0.0
    values_abnormal:
    - value: 0.05 ng/mL
      flag: H
    - value: 0.06 ng/mL
      flag: H
    - value: 0.04 ng/mL
      flag: H
    value_normal: < 0.01 ng/mL
    is_confirmatory: false
  chest_xray:
    prob_abnormal: 0.0
    values_abnormal:
    - value: Mild hyperinflation, no acute cardiopulmonary process.
      flag: H
    - value: Prominent interstitial markings, otherwise clear.
      flag: H
    - value: Slightly uncoiled aorta, lungs clear.
      flag: H
    value_normal: Clear lungs, normal cardiac silhouette, no acute bony abnormalities.
    is_confirmatory: false
  d_dimer:
    prob_abnormal: 0.05
    values_abnormal:
    - value: 550 ng/mL DDU
      flag: H
    - value: 600 ng/mL DDU
      flag: H
    - value: 520 ng/mL DDU
      flag: H
    value_normal: < 500 ng/mL DDU
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - ecg
  require: normal
- any_of:
  - troponin
  require: normal
- any_of:
  - chest_xray
  require: normal
