id: dka
severity: urgent
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 22
  sex: male
  chief_complaint: excessive thirst and frequent urination
  patient_card: 22-year-old male presents with excessive thirst, frequent urination, and nausea for two days. Known type 1
    diabetic who recently ran out of insulin.
- variant_id: v2
  variant_type: acute_severe
  age: 15
  sex: female
  chief_complaint: vomiting and deep rapid breathing
  patient_card: 15-year-old female brought in with intractable vomiting, diffuse abdominal pain, and deep rapid breathing.
    Appears lethargic and profoundly dehydrated.
- variant_id: v3
  variant_type: atypical
  age: 45
  sex: male
  chief_complaint: belly pain and feeling weak
  patient_card: 45-year-old male with type 2 diabetes presenting with diffuse belly pain and profound weakness after a recent
    mild respiratory illness. Dismissed his symptoms as a stomach bug.
