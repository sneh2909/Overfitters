exam_distribution:
  vital_signs:
    findings:
    - HR 115, BP 100/65, RR 26, Temp 37.2°C, SpO2 98%
    - HR 125, BP 90/60, RR 30, Temp 36.8°C, SpO2 99%
    - HR 105, BP 110/70, RR 22, Temp 37.5°C, SpO2 97%
  general_appearance:
    findings:
    - Ill-appearing, dry mucous membranes, fruity breath odor.
    - Lethargic, sunken eyes, deep rapid breathing.
    - Fatigued, mild distress, flushed face.
  mental_status:
    findings:
    - Alert but slow to respond, oriented x3.
    - Drowsy, awakens to voice, oriented x3.
    - Alert and oriented, slightly anxious.
  heent:
    findings:
    - Mucous membranes extremely dry, no scleral icterus.
    - Dry lips and tongue, PERRLA.
    - Tacky oral mucosa, normal conjunctivae.
  neck_exam:
    findings:
    - Supple, no JVD, no lymphadenopathy.
    - No meningismus, trachea midline.
    - Normal range of motion, no masses.
  cardiac_auscultation:
    findings:
    - Tachycardic, regular rhythm, no murmurs.
    - Rapid heart rate, normal S1/S2.
    - Tachycardia, no rubs or gallops.
  pulmonary_auscultation:
    findings:
    - Clear to auscultation bilaterally, deep rapid respirations (Kussmaul).
    - Tachypneic with deep breaths, lungs clear.
    - Clear breath sounds, increased work of breathing.
  peripheral_perfusion:
    findings:
    - Capillary refill 3 seconds, pulses weak.
    - Cool extremities, delayed cap refill.
    - Pulses 2+ but tachycardic, no edema.
  abdominal_palpation:
    findings:
    - Diffuse mild tenderness, no rebound or guarding.
    - Soft, generalized tenderness, non-distended.
    - Mild epigastric and periumbilical tenderness, bowel sounds hypoactive.
  cva_tenderness:
    findings:
    - No CVA tenderness bilaterally.
    - Negative for CVA tenderness.
    - No flank pain on percussion.
  pelvic_exam:
    findings:
    - Normal external genitalia, no discharge.
    - Deferred, no specific indications.
    - Unremarkable.
  cranial_nerves:
    findings:
    - CN II-XII grossly intact.
    - Cranial nerves intact, no focal deficits.
    - Pupils reactive, facial symmetry normal.
  motor_sensory:
    findings:
    - Normal strength and sensation, generalized weakness.
    - Moves all extremities well, reflexes 2+.
    - No focal motor or sensory deficits.
  skin_exam:
    findings:
    - Decreased skin turgor, warm and dry.
    - Poor turgor, no rashes.
    - Dry skin, no petechiae.
  musculoskeletal_chest_wall:
    findings:
    - No chest wall tenderness.
    - Normal MSK exam.
    - No joint swelling or tenderness.
