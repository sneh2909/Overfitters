exam_distribution:
  vital_signs:
    findings:
    - HR 108, BP 104/68, RR 18, Temp 37.1°C, SpO2 98%
    - HR 125, BP 88/50, RR 22, Temp 36.8°C, SpO2 97%
    - HR 95, BP 112/72, RR 16, Temp 37.0°C, SpO2 99%
  general_appearance:
    findings:
    - Patient appears in moderate distress, clutching lower abdomen.
    - Pale, diaphoretic, and anxious appearing.
    - Alert and oriented, resting in bed, appears mildly uncomfortable.
  mental_status:
    findings:
    - Alert and oriented x3, normal mentation.
    - Awake but lethargic, answers questions appropriately.
    - Alert, oriented, GCS 15.
  heent:
    findings:
    - Normocephalic, atraumatic, pale conjunctivae.
    - Pupils equal and reactive, mucous membranes slightly dry.
    - Unremarkable HEENT exam, pink conjunctivae.
  neck_exam:
    findings:
    - Supple, no JVD, no lymphadenopathy.
    - Trachea midline, no meningismus, flat neck veins.
    - Normal range of motion, no masses or bruits.
  cardiac_auscultation:
    findings:
    - Tachycardic, regular rhythm, no murmurs, rubs, or gallops.
    - Regular rate and rhythm, normal S1/S2.
    - Fast regular rhythm, no extra heart sounds.
  pulmonary_auscultation:
    findings:
    - Clear to auscultation bilaterally, no wheezes or crackles.
    - Good air movement bilaterally, unlabored breathing.
    - Lungs clear bilaterally, normal respiratory effort.
  peripheral_perfusion:
    findings:
    - Pulses 2+ bilaterally, capillary refill 2 seconds.
    - Cool extremities, thready radial pulses, capillary refill 4 seconds.
    - Warm and well perfused, no lower extremity edema.
  abdominal_palpation:
    findings:
    - Tenderness in right lower quadrant, mild voluntary guarding, no rebound.
    - Diffuse lower abdominal tenderness, right worse than left, focal rebound tenderness present.
    - Focal RLQ tenderness, negative McBurney, mild suprapubic discomfort.
  cva_tenderness:
    findings:
    - No costovertebral angle tenderness bilaterally.
    - Negative for CVA tenderness.
    - No pain on percussion of the flank.
  pelvic_exam:
    findings:
    - Right adnexal tenderness, closed cervix, scant old blood in vault.
    - Marked right adnexal fullness and tenderness, cervical motion tenderness present.
    - Mild bilateral adnexal tenderness, no visible bleeding, cervix closed.
  cranial_nerves:
    findings:
    - Cranial nerves II-XII intact.
    - Grossly intact cranial nerves.
    - No focal cranial nerve deficits.
  motor_sensory:
    findings:
    - 5/5 strength in all extremities, sensation intact.
    - Normal tone and bulk, symmetric reflexes.
    - Moves all extremities well, no sensory deficits.
  skin_exam:
    findings:
    - Skin is cool and clammy, no rashes.
    - Pale skin, diaphoretic, normal turgor.
    - Warm, dry, no petechiae or purpura.
  musculoskeletal_chest_wall:
    findings:
    - No chest wall tenderness, normal range of motion in joints.
    - Non-tender to palpation over the chest wall.
    - No reproducible chest pain on palpation.
test_sensitivities:
  beta_hcg_quant:
    prob_abnormal: 0.98
    values_abnormal:
    - value: 2,840 mIU/mL
      flag: H
    - value: 4,120 mIU/mL
      flag: H
    - value: 890 mIU/mL
      flag: H
    value_normal: <5 mIU/mL (negative)
    is_confirmatory: false
  urine_pregnancy_qualitative:
    prob_abnormal: 0.97
    values_abnormal:
    - value: Positive
      flag: H
    - value: Positive
      flag: H
    - value: Positive (faint)
      flag: H
    value_normal: Negative
    is_confirmatory: false
  pelvic_ultrasound_tv:
    prob_abnormal: 0.9
    values_abnormal:
    - value: No IUP. 2.3 cm complex right adnexal mass. Free fluid in cul-de-sac.
      flag: CRIT
    - value: Empty uterus with thickened endometrium. 3.1 cm tubal ring right adnexa. Moderate free fluid.
      flag: CRIT
    - value: No intrauterine gestation visualized. Small right adnexal mass, trace free fluid.
      flag: H
    value_normal: Intrauterine pregnancy with fetal pole and cardiac activity, no free fluid.
    is_confirmatory: true
  ct_abdomen_pelvis:
    prob_abnormal: 0.75
    values_abnormal:
    - value: Complex right adnexal mass, moderate free pelvic fluid, no appendiceal abnormality.
      flag: H
    - value: Hyperdense fluid in cul-de-sac, right adnexal mass, appendix unremarkable.
      flag: H
    - value: Nonspecific pelvic inflammatory changes, small volume free fluid.
      flag: H
    value_normal: Unremarkable abdomen and pelvis.
    is_confirmatory: false
  cbc:
    prob_abnormal: 0.6
    values_abnormal:
    - value: Hgb 10.8 g/dL [L], WBC 11,200/μL, Plt 245k
      flag: L
    - value: Hgb 8.2 g/dL [L], WBC 9,800/μL, Plt 210k
      flag: CRIT
    - value: Hgb 12.1 g/dL, WBC 13,400/μL [H], Plt 260k
      flag: H
    value_normal: Hgb 13.4, WBC 7,800, Plt 250k (all within normal limits)
    is_confirmatory: false
  bmp:
    prob_abnormal: 0.2
    values_abnormal:
    - value: Na 138, K 4.0, Cl 102, HCO3 22, BUN 24 [H], Cr 1.1
      flag: H
    - value: Na 140, K 3.8, Cl 100, HCO3 20 [L], BUN 18, Cr 0.9
      flag: L
    - value: Na 136, K 4.2, Cl 98, HCO3 24, BUN 20, Cr 1.0
      flag: N
    value_normal: All values within normal limits.
    is_confirmatory: false
  lactate:
    prob_abnormal: 0.3
    values_abnormal:
    - value: 2.8 mmol/L
      flag: H
    - value: 4.1 mmol/L
      flag: CRIT
    - value: 2.2 mmol/L
      flag: H
    value_normal: 1.1 mmol/L
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - beta_hcg_quant
  - urine_pregnancy_qualitative
  require: abnormal
- any_of:
  - pelvic_ultrasound_tv
  - ct_abdomen_pelvis
  require: abnormal
decoy:
  test: ct_abdomen_pelvis
  biased_finding: Nonspecific pelvic inflammatory changes, small volume free fluid.
  decoy_toward_disease: appendicitis
  requires_followup:
  - beta_hcg_quant
  - urine_pregnancy_qualitative
  - pelvic_ultrasound_tv
red_herring:
  disease: appendicitis
  shared_features:
  - pain_location
  - nausea_vomiting
  - abdominal_palpation
  - fever_chills
  discriminating_features:
  - lmp
  - pregnancy_possibility
  - pelvic_exam
  - beta_hcg_quant
