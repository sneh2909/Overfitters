id: ectopic_pregnancy
severity: critical
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 34
  sex: female
  chief_complaint: lower abdominal pain three days
  patient_card: 34-year-old woman presents with three days of lower abdominal pain and fatigue. Last menstrual period is uncertain.
- variant_id: v2
  variant_type: acute_severe
  age: 28
  sex: female
  chief_complaint: sudden pelvic pain and fainting
  patient_card: 28-year-old woman with sudden-onset severe right pelvic pain this morning and a syncopal episode. Appears
    pale and diaphoretic.
- variant_id: v3
  variant_type: atypical
  age: 41
  sex: female
  chief_complaint: dizziness and shoulder discomfort
  patient_card: 41-year-old woman presenting with near-syncope and vague shoulder discomfort. Dismissed mild abdominal cramping
    as indigestion.
