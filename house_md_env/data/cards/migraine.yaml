exam_distribution:
  vital_signs:
    findings:
    - HR 85, BP 120/80, RR 14, Temp 37.0°C, SpO2 99%
    - HR 95, BP 135/85, RR 16, Temp 36.8°C, SpO2 98%
    - HR 78, BP 118/76, RR 12, Temp 37.1°C, SpO2 100%
  general_appearance:
    findings:
    - Patient is lying still with eyes closed, appears uncomfortable.
    - Mild distress due to pain, wearing sunglasses in the room.
    - Appears well-nourished, holding head, wincing at loud noises.
  mental_status:
    findings:
    - Awake, alert, fully oriented. Normal speech.
    - Intact mentation, answers questions appropriately but slowly due to pain.
    - GCS 15, no confusion, normal cognition.
  heent:
    findings:
    - Pupils equal, round, reactive to light. Normal fundoscopy. Photophobia present.
    - PERRLA, extraocular movements intact, no papilledema.
    - Normal tympanic membranes, no sinus tenderness, mild photophobia.
  neck_exam:
    findings:
    - Supple, no nuchal rigidity. Negative Kernig/Brudzinski.
    - Full range of motion, no meningismus, no lymphadenopathy.
    - Neck is soft, no JVD, normal thyroid, no stiffness.
  cardiac_auscultation:
    findings:
    - Regular rate and rhythm, no murmurs.
    - Normal S1/S2, no rubs or gallops.
    - Quiet precordium, regular rhythm.
  pulmonary_auscultation:
    findings:
    - Clear to auscultation bilaterally.
    - Normal breath sounds, no wheezes or crackles.
    - Good air entry, no respiratory distress.
  peripheral_perfusion:
