  musculoskeletal_chest_wall:
    findings:
    - No chest wall tenderness, normal joint ROM.
    - No reproducible chest pain.
    - Normal MSK exam, no joint swelling.
test_sensitivities:
  ct_head_noncontrast:
    prob_abnormal: 0.05
    values_abnormal:
    - value: Mild age-related atrophy, no acute hemorrhage.
      flag: N
    - value: Small incidental arachnoid cyst, no acute intracranial abnormality.
      flag: N
    - value: Minimal microvascular ischemic changes, no acute bleed.
      flag: N
    value_normal: No acute intracranial hemorrhage, mass effect, or territorial infarction.
    is_confirmatory: false
  csf_analysis:
    prob_abnormal: 0.01
    values_abnormal:
    - value: RBC 5, WBC 2, Glucose 60, Protein 35
      flag: H
    - value: RBC 10, WBC 1, Glucose 65, Protein 40
      flag: H
    - value: RBC 2, WBC 3, Glucose 55, Protein 30
      flag: H
    value_normal: Colorless, clear. 0 RBCs, 1 WBC, normal glucose and protein. No xanthochromia.
    is_confirmatory: false
  cbc:
    prob_abnormal: 0.05
    values_abnormal:
    - value: WBC 11.2, Hgb 13.5, Plt 250
      flag: H
    - value: WBC 10.5, Hgb 12.0, Plt 300
      flag: H
    - value: WBC 9.0, Hgb 11.5, Plt 200
      flag: L
    value_normal: WBC 7.5, Hgb 14.0, Plt 280 (within normal limits)
    is_confirmatory: false
  bmp:
    prob_abnormal: 0.05
    values_abnormal:
    - value: Na 134, K 4.0, Cl 100, HCO3 24, BUN 15, Cr 0.9, Gluc 95
      flag: L
    - value: Na 138, K 3.4, Cl 102, HCO3 26, BUN 12, Cr 0.8, Gluc 105
      flag: L
    - value: Na 140, K 4.2, Cl 105, HCO3 22, BUN 20, Cr 1.1, Gluc 110
      flag: H
    value_normal: Na 140, K 4.0, Cl 102, HCO3 24, BUN 14, Cr 0.8, Gluc 90 (within normal limits)
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - ct_head_noncontrast
  - csf_analysis
  require: normal
decoy:
  test: ct_head_noncontrast
  biased_finding: No acute hemorrhage. Questionable mild hyperdensity in the basal cisterns, likely artifactual.
  decoy_toward_disease: subarachnoid_hemorrhage
  requires_followup:
  - lumbar_puncture
  - csf_analysis
red_herring:
  disease: subarachnoid_hemorrhage
  shared_features:
  - headache_probe
  - pain_severity
  - nausea_vomiting
  discriminating_features:
  - pain_onset
  - neck_exam
  - ct_head_noncontrast
