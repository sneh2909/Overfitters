id: migraine
severity: stable
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 28
  sex: female
  chief_complaint: throbbing head pain and nausea
  patient_card: 28-year-old woman presents with unilateral throbbing head pain and nausea for 8 hours. She prefers to sit
    in a dark, quiet room.
- variant_id: v2
  variant_type: acute_severe
  age: 45
  sex: female
  chief_complaint: worst pounding headache right side
  patient_card: 45-year-old woman presents with a severe, pounding headache on the right side and vomiting. She is visibly
    distressed by the room lighting.
- variant_id: v3
  variant_type: atypical
  age: 60
  sex: male
  chief_complaint: flashing lights and facial tingling
  patient_card: 60-year-old man presents with flashing lights in his vision followed by facial tingling and mild head discomfort.
    He has a history of similar visual changes in his twenties.
