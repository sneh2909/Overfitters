    - Capillary refill < 2 seconds, no calf tenderness.
    - Normal pulses bilaterally, no peripheral edema.
  abdominal_palpation:
    findings:
    - Soft, non-tender, non-distended.
    - No abdominal tenderness, active bowel sounds.
    - Benign abdomen, no guarding or rebound.
  cva_tenderness:
    findings:
    - No CVA tenderness bilaterally.
    - Negative for costovertebral angle tenderness.
    - Bilateral flanks non-tender.
  pelvic_exam:
    findings:
    - Deferred.
    - Not indicated.
    - External genitalia normal, exam deferred.
  cranial_nerves:
    findings:
    - CN II-XII intact. No focal deficits.
    - Cranial nerves grossly intact, normal facial symmetry.
    - Visual fields full, normal facial sensation and movement.
  motor_sensory:
