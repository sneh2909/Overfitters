exam_distribution:
  vital_signs:
    findings:
    - HR 110, BP 120/80, RR 18, Temp 37.2°C, SpO2 99%
    - HR 95, BP 130/85, RR 16, Temp 37.0°C, SpO2 98%
    - HR 125, BP 115/75, RR 22, Temp 37.4°C, SpO2 97%
  general_appearance:
    findings:
    - Patient is writhing in pain on the stretcher, unable to find a comfortable position.
    - Appears in acute distress, clutching her lower abdomen.
    - Pale, diaphoretic, and visibly uncomfortable.
  mental_status:
    findings:
    - Alert and oriented x3, though distracted by pain.
    - GCS 15, normal mentation.
    - Awake, alert, answering questions appropriately.
  heent:
    findings:
    - Normocephalic, atraumatic, PERRLA, mucous membranes moist.
    - Unremarkable HEENT exam.
    - Pupils equal and reactive, clear oropharynx.
  neck_exam:
    findings:
    - Supple, no JVD, no lymphadenopathy.
    - No meningismus, thyroid normal.
    - Trachea midline, no masses.
  cardiac_auscultation:
    findings:
    - Tachycardic, regular rhythm, no murmurs.
    - Normal S1/S2, regular rate and rhythm.
    - Tachycardia present, no rubs or gallops.
  pulmonary_auscultation:
    findings:
    - Clear to auscultation bilaterally.
    - Good air movement, no wheezes or crackles.
    - Lungs clear, normal respiratory effort.
  peripheral_perfusion:
    findings:
    - 2+ pulses x4, capillary refill < 2 seconds.
    - No lower extremity edema, normal pulses.
    - Warm extremities, normal perfusion.
  abdominal_palpation:
    findings:
    - Significant tenderness in the right lower quadrant with voluntary guarding. No rebound.
    - Focal left lower quadrant tenderness, palpable fullness, mild rigidity.
    - Exquisite tenderness in the suprapubic and right iliac fossa regions.
  cva_tenderness:
    findings:
    - No CVA tenderness bilaterally.
    - Mild right-sided CVA tenderness, likely referred.
    - Negative for costovertebral angle tenderness.
  pelvic_exam:
    findings:
    - Extreme right adnexal tenderness, palpable 5cm mass. Cervix closed.
    - Marked left adnexal tenderness and fullness. No cervical motion tenderness.
    - Severe unilateral adnexal pain on palpation, difficult to assess for mass due to guarding.
  cranial_nerves:
    findings:
    - Cranial nerves II-XII intact.
    - No focal cranial nerve deficits.
    - CN II-XII grossly normal.
  motor_sensory:
    findings:
    - 5/5 strength throughout, normal sensation.
    - Normal gait, intact reflexes.
    - No focal motor or sensory deficits.
  skin_exam:
    findings:
    - Skin is pale and diaphoretic.
    - Cool and clammy skin, no rashes.
    - Normal turgor, no petechiae or purpura.
  musculoskeletal_chest_wall:
    findings:
    - No chest wall tenderness.
    - Normal MSK exam, non-tender joints.
    - No reproducible chest pain on palpation.
test_sensitivities:
  pelvic_ultrasound_tv:
    prob_abnormal: 0.95
    values_abnormal:
    - value: Enlarged right ovary (6cm) with peripheral follicles and absent arterial/venous Doppler flow. Free fluid in cul-de-sac.
      flag: CRIT
    - value: Asymmetrically enlarged left ovary with heterogeneous echotexture and decreased venous flow. Suspicious for torsion.
      flag: CRIT
    - value: 5.5cm right ovarian cyst. The ovary is edematous with twisted vascular pedicle (whirlpool sign).
      flag: CRIT
    value_normal: Normal size and echotexture of both ovaries with robust symmetric Doppler flow.
    is_confirmatory: true
  beta_hcg_quant:
    prob_abnormal: 0.05
    values_abnormal:
    - value: 15 mIU/mL
      flag: H
    - value: 22 mIU/mL
      flag: H
    - value: 10 mIU/mL
      flag: H
    value_normal: <5 mIU/mL (negative)
    is_confirmatory: false
  urine_pregnancy_qualitative:
    prob_abnormal: 0.05
    values_abnormal:
    - value: Positive
      flag: H
    - value: Positive
      flag: H
    - value: Positive
      flag: H
    value_normal: Negative
    is_confirmatory: false
  cbc:
    prob_abnormal: 0.6
    values_abnormal:
    - value: WBC 13,500/μL, Hgb 13.2 g/dL, Plt 250k
      flag: H
    - value: WBC 15,200/μL, Hgb 12.8 g/dL, Plt 280k
      flag: H
    - value: WBC 11,800/μL, Hgb 14.0 g/dL, Plt 210k
      flag: H
    value_normal: WBC 8,500/μL, Hgb 13.5 g/dL, Plt 240k
    is_confirmatory: false
  ct_abdomen_pelvis:
    prob_abnormal: 0.85
    values_abnormal:
    - value: Enlarged right adnexa with a 5cm cystic structure, uterine deviation, and pelvic free fluid. Normal appendix.
      flag: H
    - value: Asymmetric enlargement of the left ovary with surrounding fat stranding. No appendicitis.
      flag: H
    - value: Prominent right ovary measuring 6.5cm, twisted pedicle suspected. Trace free fluid.
      flag: H
    value_normal: Unremarkable abdomen and pelvis. Normal ovaries and appendix.
    is_confirmatory: false
  urinalysis:
    prob_abnormal: 0.2
    values_abnormal:
    - value: Trace blood, negative LE, negative nitrites.
      flag: H
    - value: 1+ ketones, negative blood, negative WBC.
      flag: H
    - value: Small blood, 0-2 RBCs, negative infection signs.
      flag: H
    value_normal: Clear, yellow, negative blood/LE/nitrites.
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - pelvic_ultrasound_tv
  require: abnormal
decoy:
  test: ct_abdomen_pelvis
  biased_finding: Mildly prominent appendix with adjacent fluid, cannot entirely exclude early appendicitis. Enlarged right
    ovary also noted.
  decoy_toward_disease: appendicitis
  requires_followup:
  - pelvic_ultrasound_tv
red_herring:
  disease: appendicitis
  shared_features:
  - pain_location
  - nausea_vomiting
  - abdominal_palpation
  discriminating_features:
  - pelvic_exam
  - pelvic_ultrasound_tv
