id: ovarian_torsion
severity: urgent
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 28
  sex: female
  chief_complaint: sudden sharp lower belly pain
  patient_card: 28-year-old female presents with sudden onset of sharp, severe right lower quadrant abdominal pain that started
    4 hours ago, accompanied by nausea.
- variant_id: v2
  variant_type: acute_severe
  age: 38
  sex: female
  chief_complaint: intense pelvic cramping and vomiting
  patient_card: 38-year-old female arrives in obvious distress with excruciating, unrelenting pelvic pain and multiple episodes
    of non-bilious emesis. She is tachycardic and diaphoretic.
- variant_id: v3
  variant_type: atypical
  age: 15
  sex: female
  chief_complaint: dizziness and right sided ache
  patient_card: 15-year-old female brought in for near-syncope and a dull ache in her right flank and lower abdomen, initially
    attributed to a pulled muscle.
