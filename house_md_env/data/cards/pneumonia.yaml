exam_distribution:
  vital_signs:
    findings:
    - HR 110, BP 118/72, RR 22, Temp 38.8°C, SpO2 92% on room air
    - HR 125, BP 90/60, RR 28, Temp 39.2°C, SpO2 88% on room air
    - HR 98, BP 130/80, RR 20, Temp 37.6°C, SpO2 94% on room air
  general_appearance:
    findings:
    - Appears acutely ill, flushed, mild respiratory distress, coughing frequently.
    - Toxic appearing, diaphoretic, using accessory muscles to breathe.
    - Frail, lethargic, resting quietly in bed but appears fatigued.
  mental_status:
    findings:
    - Alert and oriented x3, answers questions appropriately.
    - Lethargic but rousable, oriented x3.
    - Oriented to person only, confused about time and place, GCS 14.
  heent:
    findings:
    - Normocephalic, PERRLA, dry mucous membranes, pharynx mildly erythematous.
    - Unremarkable HEENT exam, no tonsillar exudates.
    - Dry oral mucosa, no JVD, normal tympanic membranes.
  neck_exam:
    findings:
    - Supple, no meningismus, no significant lymphadenopathy.
    - Supple, no JVD, trachea midline, no cervical lymphadenopathy.
    - No nuchal rigidity, negative Kernig/Brudzinski.
  cardiac_auscultation:
    findings:
    - Tachycardic, regular rhythm, no murmurs, rubs, or gallops.
    - Regular rate and rhythm, normal S1/S2, no murmurs.
    - Tachycardic, no extra heart sounds, no rubs.
  pulmonary_auscultation:
    findings:
    - Decreased breath sounds and coarse crackles in the right lower lobe. Egophony present.
    - Bronchial breath sounds and rales in the left lower base, dullness to percussion.
    - Diffuse rhonchi and focal crackles in the right middle lobe, prolonged expiratory phase.
  peripheral_perfusion:
    findings:
    - Warm extremities, 2+ pulses, capillary refill 2 seconds, no edema.
    - Cool extremities, capillary refill 3 seconds, no calf tenderness.
    - Normal pulses, no peripheral edema, negative Homan's sign.
  abdominal_palpation:
    findings:
    - Soft, non-tender, non-distended, normal bowel sounds.
    - Soft, mild upper abdominal tenderness (likely from coughing), no rebound.
    - Non-tender, no hepatosplenomegaly, no masses.
  cva_tenderness:
    findings:
    - No CVA tenderness bilaterally.
    - Negative for CVA tenderness.
    - No costovertebral angle tenderness.
  pelvic_exam:
    findings:
    - Deferred.
    - Not indicated.
    - External genitalia normal, exam deferred.
  cranial_nerves:
    findings:
    - Cranial nerves II-XII intact.
    - Grossly intact II-XII.
    - No focal cranial nerve deficits.
  motor_sensory:
    findings:
    - 5/5 strength in all extremities, sensation intact.
    - Moves all extremities well, normal tone.
    - Generalized weakness but symmetric strength, reflexes 2+.
  skin_exam:
    findings:
    - Warm and dry, no rashes.
    - Diaphoretic, flushed, no petechiae.
    - Decreased turgor, pale, no purpura.
  musculoskeletal_chest_wall:
    findings:
    - No chest wall tenderness to palpation.
    - Mild diffuse soreness of chest wall muscles, not reproducing sharp pain.
    - No reproducible pain on rib palpation.
test_sensitivities:
  chest_xray:
    prob_abnormal: 0.95
    values_abnormal:
    - value: Focal consolidation in the right lower lobe with air bronchograms.
      flag: H
    - value: Dense left lower lobe infiltrate and small parapneumonic effusion.
      flag: CRIT
    - value: Patchy airspace opacities in the right middle lobe.
      flag: H
    value_normal: Clear lungs, no focal consolidation, effusion, or pneumothorax.
    is_confirmatory: true
  cbc:
    prob_abnormal: 0.85
    values_abnormal:
    - value: WBC 16,500/μL with 85% neutrophils and 5% bands.
      flag: H
    - value: WBC 21,000/μL with left shift, Hgb 13.2 g/dL, Plt 310k.
      flag: H
    - value: WBC 14,200/μL, Hgb 11.5 g/dL, Plt 150k.
      flag: H
    value_normal: WBC 7,500/μL, normal differential, Hgb 14.0 g/dL, Plt 250k.
    is_confirmatory: false
  bmp:
    prob_abnormal: 0.4
    values_abnormal:
    - value: Na 132 mEq/L [L], K 4.0, BUN 28 [H], Cr 1.2.
      flag: H
    - value: Na 135 mEq/L, K 3.8, BUN 35 [H], Cr 1.5 [H].
      flag: H
    - value: Na 138 mEq/L, K 4.2, BUN 20, Cr 1.0.
      flag: N
    value_normal: Electrolytes, BUN, and Creatinine within normal limits.
    is_confirmatory: false
  pulse_oximetry:
    prob_abnormal: 0.8
    values_abnormal:
    - value: 91% on room air
      flag: L
    - value: 88% on room air
      flag: CRIT
    - value: 93% on room air
      flag: L
    value_normal: 98% on room air
    is_confirmatory: false
  crp_esr:
    prob_abnormal: 0.9
    values_abnormal:
    - value: CRP 145 mg/L [H], ESR 65 mm/hr [H]
      flag: H
    - value: CRP 210 mg/L [H], ESR 80 mm/hr [H]
      flag: H
    - value: CRP 95 mg/L [H], ESR 45 mm/hr [H]
      flag: H
    value_normal: CRP <5 mg/L, ESR 10 mm/hr
    is_confirmatory: false
  blood_cultures:
    prob_abnormal: 0.15
    values_abnormal:
    - value: Positive for Streptococcus pneumoniae in 2/2 bottles.
      flag: CRIT
    - value: Positive for Haemophilus influenzae in 1/2 bottles.
      flag: H
    - value: Pending (Gram positive cocci in pairs).
      flag: H
    value_normal: No growth at 48 hours.
    is_confirmatory: false
  lactate:
    prob_abnormal: 0.3
    values_abnormal:
    - value: 2.8 mmol/L
      flag: H
    - value: 4.5 mmol/L
      flag: CRIT
    - value: 2.2 mmol/L
      flag: H
    value_normal: 1.1 mmol/L
    is_confirmatory: false
  abg:
    prob_abnormal: 0.6
    values_abnormal:
    - value: pH 7.48, pCO2 30, pO2 65 on room air.
      flag: H
    - value: pH 7.31, pCO2 55, pO2 58 on room air.
      flag: CRIT
    - value: pH 7.45, pCO2 32, pO2 70 on room air.
      flag: H
    value_normal: pH 7.40, pCO2 40, pO2 95 on room air.
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - chest_xray
  - ct_chest_pe_protocol
  require: abnormal
- any_of:
  - cbc
  - pulse_oximetry
  require: abnormal
decoy:
  test: cbc
  biased_finding: WBC 9,500/μL with lymphocyte predominance, no bands.
  decoy_toward_disease: viral_uri
  requires_followup:
  - chest_xray
red_herring:
  disease: viral_uri
  shared_features:
  - cough
  - fever_chills
  - shortness_of_breath
  - general_appearance
  discriminating_features:
  - pulmonary_auscultation
  - chest_xray
  - pulse_oximetry
