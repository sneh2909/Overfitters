id: pneumonia
severity: urgent
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 45
  sex: male
  chief_complaint: cough with green phlegm and fever
  patient_card: 45-year-old male presents with 4 days of productive cough, fever, and chills. He reports feeling progressively
    more tired and short of breath when walking up stairs.
- variant_id: v2
  variant_type: acute_severe
  age: 72
  sex: male
  chief_complaint: struggling to breathe and sweating
  patient_card: 72-year-old male brought in by family for severe shortness of breath, high fever, and lethargy. He is using
    accessory muscles to breathe and appears toxic.
- variant_id: v3
  variant_type: atypical
  age: 85
  sex: female
  chief_complaint: confusion and feeling very weak
  patient_card: 85-year-old female brought from a nursing facility due to sudden onset of confusion, generalized weakness,
    and poor appetite. She has a mild dry cough but no reported fever.
