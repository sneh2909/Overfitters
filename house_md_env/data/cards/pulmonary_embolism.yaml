id: pulmonary_embolism
severity: critical
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 45
  sex: female
  chief_complaint: sudden sharp chest pain breathing
  patient_card: 45-year-old woman presents with sudden onset of sharp, right-sided chest pain that worsens with deep breaths,
    accompanied by mild shortness of breath. She recently returned from a long-haul flight.
- variant_id: v2
  variant_type: acute_severe
  age: 62
  sex: male
  chief_complaint: gasping for air passing out
  patient_card: 62-year-old man brought in after a syncopal episode at home. He is profoundly dyspneic, tachycardic, and hypotensive,
    with cool extremities.
- variant_id: v3
  variant_type: atypical
  age: 30
  sex: female
  chief_complaint: racing heart and leg swelling
  patient_card: 30-year-old woman on oral contraceptives complaining primarily of a swollen, painful left calf for two days
    and a sensation of her heart racing today.
