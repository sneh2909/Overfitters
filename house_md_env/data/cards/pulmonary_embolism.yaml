exam_distribution:
  vital_signs:
    findings:
    - HR 115, BP 110/70, RR 24, Temp 37.2°C, SpO2 91% on room air.
    - HR 130, BP 85/50, RR 30, Temp 36.8°C, SpO2 88% on room air.
    - HR 105, BP 120/80, RR 20, Temp 37.0°C, SpO2 94% on room air.
  general_appearance:
    findings:
    - Patient appears anxious and in mild respiratory distress.
    - Patient is pale, diaphoretic, and gasping for air.
    - Alert and oriented, but visibly uncomfortable when taking deep breaths.
  mental_status:
    findings:
    - Alert and oriented x3, though anxious.
    - Lethargic and confused, arousable to voice.
    - Normal mental status, GCS 15.
  heent:
    findings:
    - Normocephalic, atraumatic, pupils equal and reactive.
    - Mucous membranes slightly dry, no pallor.
    - Unremarkable HEENT exam.
  neck_exam:
    findings:
    - Supple, no lymphadenopathy, mild jugular venous distension present.
    - Significant JVD noted, trachea midline.
    - Supple neck, no JVD, no meningismus.
  cardiac_auscultation:
    findings:
    - Tachycardic, regular rhythm, loud P2, no murmurs.
    - Tachycardic, regular rhythm, right ventricular heave appreciated.
    - Tachycardic, no murmurs, rubs, or gallops.
  pulmonary_auscultation:
    findings:
    - Clear to auscultation bilaterally, despite tachypnea.
    - Mild bibasilar crackles, otherwise clear.
    - Focal wheezing in the right lower lobe, otherwise clear.
  peripheral_perfusion:
    findings:
    - Left calf is swollen, erythematous, and tender to palpation. 2+ pulses.
    - Cool extremities, delayed capillary refill >3 seconds, no edema.
    - Pulses 2+ bilaterally, no calf tenderness or edema.
  abdominal_palpation:
    findings:
    - Soft, non-tender, non-distended, normal bowel sounds.
    - Mild right upper quadrant tenderness (hepatic congestion), no rebound.
    - Soft, non-tender, no masses or organomegaly.
  cva_tenderness:
    findings:
    - No costovertebral angle tenderness bilaterally.
    - Negative CVA tenderness.
    - Bilateral CVA non-tender.
  pelvic_exam:
    findings:
    - Deferred.
    - Normal external genitalia, no bleeding.
    - Not indicated, deferred.
  cranial_nerves:
    findings:
    - Cranial nerves II-XII grossly intact.
    - CN II-XII intact, no focal deficits.
    - Grossly normal cranial nerve exam.
  motor_sensory:
    findings:
    - 5/5 strength in all extremities, sensation intact.
    - Moves all extremities well, no focal weakness.
    - Normal bulk, tone, and strength bilaterally.
  skin_exam:
    findings:
    - No rashes. Skin is warm and dry.
    - Skin is cool, clammy, with mild peripheral cyanosis.
    - Normal turgor, no petechiae or purpura.
  musculoskeletal_chest_wall:
    findings:
    - No chest wall tenderness to palpation.
    - Mild diffuse chest wall tenderness, pain not perfectly reproducible.
    - Chest wall non-tender, normal range of motion.
test_sensitivities:
  d_dimer:
    prob_abnormal: 0.95
    values_abnormal:
    - value: 1,450 ng/mL FEU
      flag: H
    - value: 3,200 ng/mL FEU
      flag: H
    - value: 850 ng/mL FEU
      flag: H
    value_normal: <500 ng/mL FEU
    is_confirmatory: false
  ct_chest_pe_protocol:
    prob_abnormal: 0.98
    values_abnormal:
    - value: Large filling defect in the right main pulmonary artery extending into lobar branches.
      flag: CRIT
    - value: Bilateral segmental pulmonary emboli. Right ventricular strain pattern noted.
      flag: CRIT
    - value: Small subsegmental pulmonary embolus in the left lower lobe.
      flag: H
    value_normal: No evidence of pulmonary embolism. Lungs are clear.
    is_confirmatory: true
  ecg:
    prob_abnormal: 0.85
    values_abnormal:
    - value: Sinus tachycardia at 115 bpm. S1Q3T3 pattern present.
      flag: H
    - value: Sinus tachycardia at 125 bpm. Right bundle branch block and T-wave inversions in V1-V4.
      flag: H
    - value: Sinus tachycardia at 105 bpm. Nonspecific ST-T wave changes.
      flag: H
    value_normal: Normal sinus rhythm at 75 bpm. Normal axis and intervals.
    is_confirmatory: false
  troponin:
    prob_abnormal: 0.4
    values_abnormal:
    - value: 45 ng/L
      flag: H
    - value: 120 ng/L
      flag: H
    - value: 35 ng/L
      flag: H
    value_normal: <14 ng/L
    is_confirmatory: false
  bnp:
    prob_abnormal: 0.5
    values_abnormal:
    - value: 450 pg/mL
      flag: H
    - value: 800 pg/mL
      flag: H
    - value: 300 pg/mL
      flag: H
    value_normal: <100 pg/mL
    is_confirmatory: false
  chest_xray:
    prob_abnormal: 0.3
    values_abnormal:
    - value: Wedge-shaped opacity in the right lower lobe (Hampton's hump).
      flag: H
    - value: Prominent central pulmonary artery with oligemia in the right lung (Westermark sign).
      flag: H
    - value: Small right-sided pleural effusion, otherwise clear.
      flag: H
    value_normal: Clear lungs, normal cardiac silhouette, no acute cardiopulmonary process.
    is_confirmatory: false
  abg:
    prob_abnormal: 0.8
    values_abnormal:
    - value: pH 7.48, pCO2 30 mmHg, pO2 65 mmHg on room air.
      flag: H
    - value: pH 7.50, pCO2 28 mmHg, pO2 55 mmHg on room air.
      flag: CRIT
    - value: pH 7.45, pCO2 32 mmHg, pO2 70 mmHg on room air.
      flag: H
    value_normal: pH 7.40, pCO2 40 mmHg, pO2 95 mmHg on room air.
    is_confirmatory: false
  doppler_us_extremity:
    prob_abnormal: 0.4
    values_abnormal:
    - value: Non-compressible left popliteal vein consistent with deep vein thrombosis.
      flag: H
    - value: Extensive acute DVT involving the right femoral and popliteal veins.
      flag: H
    - value: Echogenic thrombus in the left posterior tibial vein.
      flag: H
    value_normal: Normal compressibility and flow in bilateral lower extremity deep veins. No evidence of DVT.
    is_confirmatory: false
  pulse_oximetry:
    prob_abnormal: 0.85
    values_abnormal:
    - value: 91% on room air
      flag: L
    - value: 86% on room air
      flag: CRIT
    - value: 93% on room air
      flag: L
    value_normal: 98% on room air
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - ct_chest_pe_protocol
  require: abnormal
decoy:
  test: chest_xray
  biased_finding: Clear lungs, normal cardiac silhouette, no acute cardiopulmonary process.
  decoy_toward_disease: anxiety_attack
  requires_followup:
  - d_dimer
  - ct_chest_pe_protocol
red_herring:
  disease: anxiety_attack
  shared_features:
  - shortness_of_breath
  - palpitations
  - chest_pain_probe
  - vital_signs
  - general_appearance
  discriminating_features:
  - pulse_oximetry
  - d_dimer
  - ct_chest_pe_protocol
