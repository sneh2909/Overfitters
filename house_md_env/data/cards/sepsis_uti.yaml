exam_distribution:
  vital_signs:
    findings:
    - HR 115, BP 88/54, RR 22, Temp 39.2°C, SpO2 96%
    - HR 125, BP 95/60, RR 24, Temp 38.8°C, SpO2 95%
    - HR 108, BP 102/65, RR 20, Temp 39.5°C, SpO2 97%
