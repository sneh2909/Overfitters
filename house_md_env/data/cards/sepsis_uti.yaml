id: sepsis_uti
severity: urgent
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 68
  sex: female
  chief_complaint: fever and burning with urination
  patient_card: 68-year-old woman presents with three days of dysuria, frequency, and subjective fevers. She reports feeling
    increasingly weak and lethargic today.
- variant_id: v2
  variant_type: acute_severe
  age: 82
  sex: male
  chief_complaint: severe confusion and shaking chills
  patient_card: 82-year-old man brought in by family due to acute altered mental status and rigors. He has a history of benign
    prostatic hyperplasia.
- variant_id: v3
  variant_type: atypical
  age: 45
  sex: female
  chief_complaint: extreme weakness and feeling cold
  patient_card: 45-year-old woman with poorly controlled diabetes presents with profound fatigue, generalized malaise, and
    feeling cold. Denies localized pain.
