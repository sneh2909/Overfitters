    - Ill-appearing, flushed, diaphoretic, experiencing visible rigors.
    - Lethargic, pale, appears toxic and uncomfortable.
    - Fatigued, dry mucous membranes, resting with eyes closed.
  mental_status:
    findings:
    - Alert but slow to respond, oriented to person only.
    - Confused, lethargic, GCS 13.
    - Awake, alert, and fully oriented, though fatigued.
