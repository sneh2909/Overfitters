test_sensitivities:
  urinalysis:
    prob_abnormal: 0.98
    values_abnormal:
    - value: WBC >50/hpf, +Nitrite, +Leukocyte Esterase, Many bacteria
      flag: H
    - value: WBC TNTC, +Leukocyte Esterase, Moderate bacteria
      flag: H
    - value: WBC 30/hpf, Trace blood, +Nitrite
      flag: H
    value_normal: WBC 0-2/hpf, Negative LE/Nitrite
    is_confirmatory: false
  urine_culture:
    prob_abnormal: 0.95
    values_abnormal:
    - value: '>100,000 CFU/mL Escherichia coli'
      flag: H
    - value: '>100,000 CFU/mL Klebsiella pneumoniae'
      flag: H
    - value: 50,000 CFU/mL Proteus mirabilis
      flag: H
    value_normal: No growth
    is_confirmatory: true
  cbc:
    prob_abnormal: 0.9
    values_abnormal:
    - value: WBC 18.5k, 85% neutrophils, 10% bands
      flag: H
    - value: WBC 22.1k, 88% neutrophils
      flag: H
    - value: WBC 3.2k (leukopenia), 20% bands
      flag: L
    value_normal: WBC 7.5k, normal differential
    is_confirmatory: false
  bmp:
    prob_abnormal: 0.75
    values_abnormal:
    - value: BUN 35, Cr 1.8 (baseline 1.0), HCO3 18
      flag: H
    - value: BUN 42, Cr 2.1, K 5.1
      flag: H
    - value: BUN 28, Cr 1.4, HCO3 20
      flag: H
    value_normal: BUN 15, Cr 0.9, electrolytes normal
    is_confirmatory: false
  lactate:
    prob_abnormal: 0.85
    values_abnormal:
    - value: 4.2 mmol/L
      flag: CRIT
    - value: 3.5 mmol/L
      flag: H
    - value: 5.8 mmol/L
      flag: CRIT
    value_normal: 1.1 mmol/L
    is_confirmatory: false
  blood_cultures:
    prob_abnormal: 0.6
    values_abnormal:
    - value: 2/2 bottles positive for Gram-negative rods (E. coli)
      flag: CRIT
    - value: 1/2 bottles positive for Gram-negative rods
      flag: H
    - value: 2/2 bottles positive for Klebsiella pneumoniae
      flag: CRIT
    value_normal: No growth at 5 days
    is_confirmatory: true
  abg:
    prob_abnormal: 0.6
    values_abnormal:
    - value: pH 7.28, pCO2 30, pO2 85, HCO3 14
      flag: L
    - value: pH 7.31, pCO2 32, pO2 90, HCO3 16
      flag: L
    - value: pH 7.25, pCO2 28, pO2 88, HCO3 12
      flag: CRIT
    value_normal: pH 7.40, pCO2 40, pO2 95, HCO3 24
    is_confirmatory: false
  chest_xray:
    prob_abnormal: 0.3
    values_abnormal:
    - value: Mild bibasilar atelectasis, cannot exclude early infiltrate.
      flag: H
    - value: Low lung volumes with basilar subsegmental atelectasis.
      flag: H
    - value: Patchy opacity at the left base, possibly atelectasis.
      flag: H
    value_normal: Clear lungs, normal cardiac silhouette.
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - urinalysis
  - urine_culture
  require: abnormal
- any_of:
  - lactate
  - blood_cultures
  - cbc
  require: abnormal
decoy:
  test: chest_xray
  biased_finding: Mild bibasilar atelectasis, cannot exclude early infiltrate.
  decoy_toward_disease: pneumonia
  requires_followup:
  - urinalysis
  - urine_culture
red_herring:
  disease: pneumonia
  shared_features:
  - fever_chills
  - shortness_of_breath
  - vital_signs
  - general_appearance
  discriminating_features:
  - urinary_symptoms
  - cough
  - pulmonary_auscultation
  - urinalysis
