id: stemi
severity: critical
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 55
  sex: male
  chief_complaint: crushing chest pressure and sweating
  patient_card: 55-year-old male presents with crushing substernal chest pressure radiating to his left arm, accompanied by
    diaphoresis, which started 45 minutes ago.
- variant_id: v2
  variant_type: acute_severe
  age: 65
  sex: male
  chief_complaint: severe chest tightness and dizziness
  patient_card: 65-year-old male arrives via EMS with severe chest tightness, shortness of breath, and near-syncope. He appears
    ashen and is hypotensive.
- variant_id: v3
  variant_type: atypical
  age: 75
  sex: female
  chief_complaint: sudden weakness and jaw ache
  patient_card: 75-year-old female with a history of diabetes presents with sudden profound weakness, nausea, and a dull ache
    in her lower jaw. Denies classic chest pain.
