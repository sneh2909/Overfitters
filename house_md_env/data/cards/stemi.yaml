test_sensitivities:
  ecg:
    prob_abnormal: 0.99
    values_abnormal:
    - value: Sinus tachycardia, 3mm ST elevations in V1-V4 with reciprocal changes.
      flag: CRIT
    - value: 2mm ST elevations in II, III, aVF with ST depressions in I and aVL.
      flag: CRIT
    - value: New Left Bundle Branch Block (LBBB).
      flag: CRIT
    value_normal: Normal sinus rhythm, normal axis, no ST-T wave changes.
    is_confirmatory: true
  troponin:
    prob_abnormal: 0.95
    values_abnormal:
    - value: 1,250 ng/L
      flag: CRIT
    - value: 450 ng/L
      flag: H
    - value: 3,400 ng/L
      flag: CRIT
    value_normal: < 14 ng/L
    is_confirmatory: true
  chest_xray:
    prob_abnormal: 0.3
    values_abnormal:
    - value: Mild pulmonary vascular congestion, normal cardiac silhouette.
      flag: H
    - value: Prominent interstitial markings suggestive of early pulmonary edema.
      flag: H
    - value: Cardiomegaly with mild cephalization of vessels.
      flag: H
    value_normal: Clear lungs, normal heart size, no acute cardiopulmonary process.
    is_confirmatory: false
  cbc:
    prob_abnormal: 0.2
    values_abnormal:
    - value: WBC 11.5, Hgb 14.0, Plt 250
      flag: H
    - value: WBC 12.2, Hgb 13.5, Plt 220
      flag: H
    - value: WBC 10.8, Hgb 15.1, Plt 280
      flag: H
    value_normal: WBC 7.5, Hgb 14.5, Plt 260 (within normal limits)
    is_confirmatory: false
  bmp:
    prob_abnormal: 0.3
    values_abnormal:
    - value: Na 138, K 3.4, Cr 1.2, Glu 150
      flag: H
    - value: Na 140, K 4.0, Cr 1.5, Glu 180
      flag: H
    - value: Na 135, K 3.8, Cr 1.1, Glu 210
      flag: H
    value_normal: Na 140, K 4.0, Cr 0.9, Glu 95 (within normal limits)
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - ecg
  require: abnormal
- any_of:
  - troponin
  require: abnormal
