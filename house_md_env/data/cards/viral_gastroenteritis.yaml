id: viral_gastroenteritis
severity: stable
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 25
  sex: male
  chief_complaint: stomach cramps and watery diarrhea
  patient_card: 25-year-old male presents with 24 hours of diffuse stomach cramps, frequent watery stools, and nausea. Sick
    contacts at work.
- variant_id: v2
  variant_type: acute_severe
  age: 35
  sex: female
  chief_complaint: severe vomiting and unable to drink
  patient_card: 35-year-old female presents with intractable vomiting and diarrhea for two days. She feels lightheaded when
    standing and has not kept fluids down.
- variant_id: v3
  variant_type: atypical
  age: 65
  sex: male
  chief_complaint: dizziness and generalized weakness
  patient_card: 65-year-old male presents with near-syncope and profound weakness. Upon further questioning, he admits to
    several days of loose stools and poor appetite.
