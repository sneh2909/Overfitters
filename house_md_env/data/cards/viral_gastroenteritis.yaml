test_sensitivities:
  cbc:
    prob_abnormal: 0.4
    values_abnormal:
    - value: WBC 11.5 x10^3/uL, Hgb 15.2 g/dL, Plt 250k
      flag: H
    - value: WBC 12.1 x10^3/uL, Hgb 14.8 g/dL, Plt 280k
      flag: H
    - value: WBC 10.8 x10^3/uL, Hgb 16.1 g/dL (hemoconcentration), Plt 210k
      flag: H
    value_normal: WBC 7.5 x10^3/uL, Hgb 14.0 g/dL, Plt 240k
    is_confirmatory: false
  bmp:
    prob_abnormal: 0.6
    values_abnormal:
    - value: Na 138, K 3.2 [L], Cl 105, HCO3 22, BUN 28 [H], Cr 1.2 [H], Gluc 95
      flag: H
    - value: Na 140, K 3.4 [L], Cl 102, HCO3 24, BUN 32 [H], Cr 1.4 [H], Gluc 105
      flag: H
    - value: Na 136, K 3.1 [L], Cl 100, HCO3 20, BUN 25 [H], Cr 1.1, Gluc 88
      flag: L
    value_normal: Na 140, K 4.0, Cl 102, HCO3 24, BUN 15, Cr 0.8, Gluc 90
    is_confirmatory: false
  lipase:
    prob_abnormal: 0.05
    values_abnormal:
    - value: 85 U/L
      flag: H
    - value: 90 U/L
      flag: H
    - value: 78 U/L
      flag: H
    value_normal: 35 U/L
    is_confirmatory: false
  urinalysis:
    prob_abnormal: 0.7
    values_abnormal:
    - value: SG 1.030, Ketones 2+, no LE, no nitrites
      flag: H
    - value: SG 1.035, Ketones 3+, no blood, no WBCs
      flag: H
    - value: SG 1.028, Ketones 1+, trace protein, no infection signs
      flag: H
    value_normal: SG 1.015, negative ketones, negative LE/nitrite
    is_confirmatory: false
  ct_abdomen_pelvis:
    prob_abnormal: 0.1
    values_abnormal:
    - value: Fluid-filled loops of bowel, normal appendix.
      flag: N
    - value: Mild mesenteric adenopathy, appendix unremarkable.
      flag: N
    - value: Prominent small bowel folds consistent with enteritis, normal appendix.
      flag: N
    value_normal: Unremarkable CT abdomen and pelvis. Normal appendix.
    is_confirmatory: false
  abdominal_ultrasound:
    prob_abnormal: 0.1
    values_abnormal:
    - value: Hyperperistalsis of small bowel, appendix normal.
      flag: N
    - value: Trace free fluid in RLQ, appendix compressible and normal.
      flag: N
    - value: Prominent bowel loops, no acute cholecystitis or appendicitis.
      flag: N
    value_normal: Normal abdominal ultrasound. Appendix normal where visualized.
    is_confirmatory: false
minimum_evidence_set:
- any_of:
  - ct_abdomen_pelvis
  - abdominal_ultrasound
  require: normal
decoy:
  test: cbc
  biased_finding: WBC 11.5 x10^3/uL (mildly elevated), Hgb 14.2 g/dL, Plt 250k
  decoy_toward_disease: appendicitis
  requires_followup:
  - ct_abdomen_pelvis
  - abdominal_ultrasound
red_herring:
  disease: appendicitis
  shared_features:
  - nausea_vomiting
  - pain_location
  - fever_chills
  - abdominal_palpation
  discriminating_features:
  - bowel_changes
  - ct_abdomen_pelvis
  - abdominal_ultrasound
