id: viral_uri
severity: stable
presentation_variants:
- variant_id: v1
  variant_type: textbook
  age: 25
  sex: female
  chief_complaint: runny nose and sore throat
  patient_card: 25-year-old female presents with three days of nasal congestion, rhinorrhea, and a scratchy throat. She reports
    a mild dry cough that started yesterday.
- variant_id: v2
  variant_type: acute_severe
  age: 45
  sex: male
  chief_complaint: bad cough and feeling hot
  patient_card: 45-year-old male complains of a persistent hacking cough, low-grade fever, and generalized myalgias for the
    past four days. He feels miserable and has been unable to sleep.
- variant_id: v3
  variant_type: atypical
  age: 65
  sex: female
  chief_complaint: tiredness and scratchy throat
  patient_card: 65-year-old female presents primarily with fatigue and a mild scratchy throat. She denies fever but mentions
    her grandchildren were recently sick.
