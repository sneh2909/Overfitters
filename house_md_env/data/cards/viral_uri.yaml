test_sensitivities:
  chest_xray:
    prob_abnormal: 0.05
    values_abnormal:
    - value: Prominent peribronchial cuffing, no focal consolidation.
      flag: H
    - value: Mild hyperinflation, clear lung fields.
      flag: H
    - value: Subsegmental atelectasis, no pneumonia.
      flag: H
    value_normal: Clear lungs bilaterally. No focal consolidation, pleural effusion, or pneumothorax.
    is_confirmatory: false
  cbc:
    prob_abnormal: 0.1
    values_abnormal:
    - value: WBC 11.2 (mild elevation), Hgb 14.0, Plt 250k
      flag: H
    - value: WBC 3.8 (mild leukopenia), Hgb 13.5, Plt 210k
      flag: L
    - value: WBC 10.5, Hgb 14.2, Plt 140k (mild thrombocytopenia)
      flag: L
    value_normal: WBC 7.5, Hgb 14.1, Plt 260k. Normal differential.
    is_confirmatory: false
  pulse_oximetry:
    prob_abnormal: 0.05
    values_abnormal:
    - value: 94% on room air
      flag: L
    - value: 95% on room air
      flag: L
    - value: 93% on room air
      flag: L
    value_normal: 98% on room air
    is_confirmatory: false
  crp_esr:
    prob_abnormal: 0.15
    values_abnormal:
    - value: CRP 12 mg/L, ESR 25 mm/hr
      flag: H
    - value: CRP 8 mg/L, ESR 15 mm/hr
