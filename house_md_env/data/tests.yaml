    cost: 900
    turnaround_steps: 2
  - id: abdominal_ultrasound
    name: "Abdominal ultrasound"
    category: imaging
    cost: 250
    turnaround_steps: 1
  - id: pelvic_ultrasound_tv
    name: "Transvaginal pelvic ultrasound with Doppler"
    category: imaging
    cost: 300
    turnaround_steps: 1
  - id: mri_brain
    name: "MRI brain with and without contrast"
    category: imaging
    cost: 1500
    turnaround_steps: 3
  - id: echocardiogram
    name: "Transthoracic echocardiogram"
    category: imaging
    cost: 500
    turnaround_steps: 2
  - id: doppler_us_extremity
    name: "Lower extremity venous Doppler (DVT study)"
    category: imaging
    cost: 300
    turnaround_steps: 1

  # =========================================================================
  # BEDSIDE / POINT-OF-CARE (5) — cost $10–$250, turnaround 0–1
