  - id: stress_test
    name: "Exercise stress test"
    category: specialty
    cost: 600
    turnaround_steps: 3
  - id: peak_flow
    name: "Bedside peak expiratory flow"
    category: specialty
    cost: 15
    turnaround_steps: 0
