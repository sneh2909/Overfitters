# House M.D. — ORDER_TEST catalog (fixed menu)
# Agent emits one `id` per ORDER_TEST action. Env charges `cost`, waits
# `turnaround_steps` before the result appears in the observation, and samples
# a value from the disease card's test_sensitivities[id].
#
# 35 tests. Cost scale designed so R2 (cost efficiency) has real dynamic range:
# cheap probes $10–$50, moderate labs $30–$80, imaging $150–$1500.
#
# turnaround_steps:
#   0 = result available SAME step (point-of-care, bedside)
#   1 = available next step
#   2–3 = slower; ordering late in the episode is a real risk

version: 1
count: 35

tests:

  # =========================================================================
  # BASIC LABS (10) — cost $20–$60, turnaround 1
  # =========================================================================
  - id: cbc
    name: "Complete blood count with differential"
    category: lab_basic
    cost: 30
    turnaround_steps: 1
  - id: bmp
    name: "Basic metabolic panel (Na, K, Cl, HCO3, BUN, Cr, glucose)"
    category: lab_basic
    cost: 30
    turnaround_steps: 1
  - id: lft
    name: "Liver function panel (AST, ALT, ALP, bilirubin)"
    category: lab_basic
    cost: 40
    turnaround_steps: 1
  - id: lipase
    name: "Serum lipase"
    category: lab_basic
    cost: 30
    turnaround_steps: 1
  - id: urinalysis
    name: "Urinalysis with microscopy"
    category: lab_basic
    cost: 20
    turnaround_steps: 0
  - id: beta_hcg_quant
    name: "Quantitative beta-hCG"
    category: lab_basic
    cost: 50
    turnaround_steps: 1
  - id: troponin
    name: "High-sensitivity troponin"
    category: lab_basic
    cost: 60
    turnaround_steps: 1
  - id: d_dimer
    name: "D-dimer"
    category: lab_basic
    cost: 50
    turnaround_steps: 1
  - id: lactate
    name: "Serum lactate"
    category: lab_basic
    cost: 40
    turnaround_steps: 1
  - id: coags
    name: "PT/INR and PTT"
    category: lab_basic
    cost: 40
    turnaround_steps: 1

  # =========================================================================
  # TARGETED LABS (8) — cost $30–$150, turnaround 1–2
  # =========================================================================
  - id: tsh
    name: "TSH (thyroid-stimulating hormone)"
    category: lab_targeted
    cost: 40
    turnaround_steps: 1
  - id: hba1c
    name: "Hemoglobin A1c"
    category: lab_targeted
    cost: 40
    turnaround_steps: 1
  - id: bnp
    name: "BNP (B-type natriuretic peptide)"
    category: lab_targeted
    cost: 80
    turnaround_steps: 1
  - id: blood_cultures
    name: "Blood cultures ×2"
    category: lab_targeted
    cost: 80
    turnaround_steps: 2
  - id: urine_culture
    name: "Urine culture with sensitivities"
    category: lab_targeted
    cost: 50
    turnaround_steps: 2
  - id: csf_analysis
    name: "CSF analysis (cell count, protein, glucose, gram stain, culture)"
    category: lab_targeted
    cost: 150
    turnaround_steps: 1
  - id: abg
    name: "Arterial blood gas"
    category: lab_targeted
    cost: 80
    turnaround_steps: 0
  - id: crp_esr
    name: "CRP and ESR"
    category: lab_targeted
    cost: 30
    turnaround_steps: 1

  # =========================================================================
  # IMAGING (10) — cost $120–$1500, turnaround 1–3
  # =========================================================================
  - id: chest_xray
    name: "Chest X-ray (PA and lateral)"
    category: imaging
    cost: 150
    turnaround_steps: 1
  - id: abdominal_xray
    name: "Abdominal X-ray (supine and upright)"
    category: imaging
    cost: 120
    turnaround_steps: 1
  - id: ct_head_noncontrast
    name: "CT head without contrast"
